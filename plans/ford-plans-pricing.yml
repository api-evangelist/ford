specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Ford
providerId: ford
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automobiles
  - Cars
  - Connected Vehicle
  - Vehicles
description: Ford operates a Developer Marketplace at developer.ford.com offering APIs for connected-vehicle data, FordPass, vehicle telemetry, and dealer/fleet integrations. Access requires partner-program approval; pricing is partner-negotiated and not publicly listed. Ford has historically also worked with intermediaries (Smartcar, High Mobility) for third-party access.
notes: developer.ford.com requires JavaScript and partner sign-up. No public dollar pricing. Scaffold trimmed to a sandbox + partner-licensed model.
sources:
  - https://developer.ford.com/
  - https://developer.ford.com/apis
  - https://developer.ford.com/use-cases
plans:
  - id: ford-developer
    name: Developer / Sandbox
    type: freemium
    description: Developer-portal access for evaluating Ford APIs (FordPass, vehicle data, dealer/fleet) in a sandbox environment. Requires partner-program registration; not for production access to live vehicles.
    entries:
      - label: Sandbox Access
        description: Non-production sandbox access via developer.ford.com partner program
        name: sandbox_access
        type: flat
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://developer.ford.com
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Developer Portal Documentation
      - name: Sandbox Credentials
      - name: Sample Vehicle Data
  - id: ford-partner
    name: Partner / Production
    type: enterprise
    description: Production Ford API access for approved partners (insurance, fleet, mobility, OEM ecosystem). Pricing is negotiated per partnership; access governed by Ford's connected-vehicle data agreements and customer-consent workflow.
    entries:
      - label: API Access
        description: Production API access; per-vehicle, per-call, or per-data-type pricing per partnership agreement
        name: api_access
        type: usage-based
        metric: varies
        limit: -1
        timeFrame: usage
        geo: global
        domains:
          - https://api.mps.ford.com
        unit: 1
        price: contact sales
        userMultiplied: false
      - label: Per-Vehicle Connected Data
        description: Optional per-vehicle subscription for streaming telemetry / status data
        name: vehicle_subscription
        type: subscription
        metric: vehicle
        limit: -1
        timeFrame: month
        geo: global
        domains: []
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Production API Access
      - name: Connected Vehicle Data
      - name: Customer-Consent Workflow
      - name: Webhook / Streaming Telemetry
      - name: Named Partner Manager
maintainers: []
