# ─────────────────────────────────────────────
# Root Types
# ─────────────────────────────────────────────

type Query {
  vehicle(id: ID!): Vehicle
  vehicleByVin(vin: String!): Vehicle
  connectedVehicle(id: ID!): ConnectedVehicle
  vehicleProfile(id: ID!): VehicleProfile
  vehicleStatus(vehicleId: ID!): VehicleStatus
  vehicleLocation(vehicleId: ID!): Location
  fuelLevel(vehicleId: ID!): FuelLevel
  odometer(vehicleId: ID!): OdoReading
  batteryLevel(vehicleId: ID!): BatteryLevel
  chargeStatus(vehicleId: ID!): ChargeStatus
  chargeSettings(vehicleId: ID!): ChargeSettings
  chargingSchedules(vehicleId: ID!): [ChargingSchedule!]
  chargingLocations(vehicleId: ID!): [ChargingLocation!]
  evRange(vehicleId: ID!): EVRange
  evRangeEstimate(vehicleId: ID!): EVRangeEstimate
  tripHistory(vehicleId: ID!, startDate: Date, endDate: Date): TripHistory
  tripDetail(tripId: ID!): TripDetail
  driveHistory(vehicleId: ID!): DriveHistory
  fuelEfficiency(vehicleId: ID!, periodDays: Int): FuelEfficiency
  alerts(vehicleId: ID!, includeResolved: Boolean): [VehicleAlert!]
  maintenanceReminders(vehicleId: ID!): [MaintenanceReminder!]
  oilChange(vehicleId: ID!): OilChange
  serviceHistory(vehicleId: ID!): ServiceHistory
  tireStatus(vehicleId: ID!): TireStatus
  diagnosticCodes(vehicleId: ID!, activeOnly: Boolean): [DiagnosticCode!]
  recalls(vehicleId: ID): [Recall!]
  nearbyChargingStations(coordinate: CoordinateInput!, radiusKm: Float, connectorType: ConnectorType): [ChargingStation!]
  fordPass(userId: ID!): FordPass
  dealerLocator(coordinate: CoordinateInput!, radiusKm: Float, isEvCertified: Boolean): DealerLocator
  dealerInventory(dealerId: ID!): DealerInventory
  wltpEmissions(vehicleConfigurationId: ID!): WLTPEmissions
  apiKeys: [APIKey!]
  webhooks: [Webhook!]
}

type Mutation {
  lockVehicle(vehicleId: ID!): CommandResult!
  unlockVehicle(vehicleId: ID!): CommandResult!
  remoteStart(vehicleId: ID!, durationMinutes: Int): RemoteStart!
  remoteStop(vehicleId: ID!): RemoteStop!
  startCharging(vehicleId: ID!): CommandResult!
  stopCharging(vehicleId: ID!): CommandResult!
  updateChargeSettings(vehicleId: ID!, input: ChargeSettingsInput!): ChargeSettings!
  createChargingSchedule(vehicleId: ID!, input: ChargingScheduleInput!): ChargingSchedule!
  updateChargingSchedule(scheduleId: ID!, input: ChargingScheduleInput!): ChargingSchedule!
  deleteChargingSchedule(scheduleId: ID!): Boolean!
  addChargingLocation(vehicleId: ID!, input: ChargingLocationInput!): ChargingLocation!
  removeChargingLocation(locationId: ID!): Boolean!
  sendNavigationRoute(vehicleId: ID!, input: NavigationRouteInput!): NavigationRoute!
  acknowledgeAlert(alertId: ID!): VehicleAlert!
  registerWebhook(input: WebhookInput!): Webhook!
  updateWebhook(webhookId: ID!, input: WebhookInput!): Webhook!
  deleteWebhook(webhookId: ID!): Boolean!
  createApiKey(name: String!, scopes: [String!]!): APIKey!
  revokeApiKey(apiKeyId: ID!): Boolean!
  refreshToken(refreshToken: String!): Token!
}

type Subscription {
  vehicleStatusChanged(vehicleId: ID!): VehicleStatus!
  locationUpdated(vehicleId: ID!): Location!
  chargeStatusChanged(vehicleId: ID!): ChargeStatus!
  alertTriggered(vehicleId: ID!): VehicleAlert!
  commandCompleted(vehicleId: ID!): CommandResult!
}

# ─────────────────────────────────────────────
# Input Types
# ─────────────────────────────────────────────

input CoordinateInput {
  latitude: Latitude!
  longitude: Longitude!
}

input ChargeSettingsInput {
  targetChargeLevel: Percentage!
  preferredChargeStartTime: String
  chargeMode: String
}

input ChargingScheduleInput {
  enabled: Boolean!
  startTime: String!
  endTime: String
  daysOfWeek: [String!]!
  targetChargeLevel: Percentage
}

input ChargingLocationInput {
  name: String!
  coordinate: CoordinateInput!
  isHome: Boolean!
  isWork: Boolean!
}

input NavigationRouteInput {
  destination: CoordinateInput!
  waypoints: [CoordinateInput!]
}

input WebhookInput {
  url: URL!
  events: [WebhookEvent!]!
  vehicleIds: [ID!]
  secret: String
}
