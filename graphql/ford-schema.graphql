# Ford Motor Company — Conceptual GraphQL Schema
# Source: https://developer.ford.com/
# APIs: FordConnect, Ford WLTP Emissions
# Schema type: Conceptual

# ─────────────────────────────────────────────
# Scalars
# ─────────────────────────────────────────────

scalar DateTime
scalar Date
scalar JSON
scalar URL
scalar Latitude
scalar Longitude
scalar KilometersPerLiter
scalar Liters
scalar Kilometers
scalar Percentage
scalar Kilowatts

# ─────────────────────────────────────────────
# Enums
# ─────────────────────────────────────────────

enum IgnitionState {
  ON
  OFF
  ACCESSORY
  UNKNOWN
}

enum DoorState {
  OPEN
  CLOSED
  AJAR
  UNKNOWN
}

enum LockState {
  LOCKED
  UNLOCKED
  UNKNOWN
}

enum WindowState {
  OPEN
  CLOSED
  PARTIALLY_OPEN
  UNKNOWN
}

enum ChargeState {
  CHARGING
  NOT_CHARGING
  FULLY_CHARGED
  CHARGE_PENDING
  FAULT
  UNKNOWN
}

enum PlugState {
  PLUGGED_IN
  UNPLUGGED
  UNKNOWN
}

enum RemoteCommandStatus {
  PENDING
  IN_PROGRESS
  COMPLETED
  FAILED
  TIMEOUT
}

enum AlertSeverity {
  INFO
  WARNING
  CRITICAL
}

enum FuelType {
  GASOLINE
  DIESEL
  ELECTRIC
  HYBRID
  PLUG_IN_HYBRID
  HYDROGEN
}

enum DrivetrainType {
  FWD
  RWD
  AWD
  FOUR_WD
}

enum VehicleCondition {
  NEW
  USED
  CERTIFIED_PRE_OWNED
}

enum TokenType {
  ACCESS_TOKEN
  REFRESH_TOKEN
}

enum WebhookEvent {
  VEHICLE_STATUS_CHANGED
  DOOR_STATE_CHANGED
  LOCK_STATE_CHANGED
  CHARGE_STATE_CHANGED
  LOCATION_UPDATED
  ALERT_TRIGGERED
  REMOTE_COMMAND_COMPLETED
}

enum ConnectorType {
  CCS
  CHADEMO
  TYPE2
  J1772
  NACS
  CCS2
}

# ─────────────────────────────────────────────
# Vehicle Identity
# ─────────────────────────────────────────────

type VIN {
  value: String!
  worldManufacturerIdentifier: String
  vehicleDescriptorSection: String
  vehicleIdentifierSection: String
}

type Make {
  id: ID!
  name: String!
  country: String
}

type Model {
  id: ID!
  name: String!
  make: Make!
  years: [Year!]
}

type Trim {
  id: ID!
  name: String!
  model: Model!
  year: Year!
  fuelType: FuelType
  drivetrain: DrivetrainType
  basePrice: Float
  currency: String
}

type Year {
  value: Int!
}

type Color {
  id: ID!
  name: String!
  hexCode: String
  type: String
}

type Vehicle {
  id: ID!
  vin: VIN!
  make: Make!
  model: Model!
  trim: Trim
  year: Year!
  color: Color
  fuelType: FuelType
  drivetrain: DrivetrainType
  engineDisplacement: Float
  transmissionType: String
  seatingCapacity: Int
  nickName: String
  imageUrl: URL
}

type VehicleProfile {
  id: ID!
  vehicle: Vehicle!
  owner: String
  enrolledInFordPass: Boolean!
  connectedServicesEnabled: Boolean!
  registeredAt: DateTime
  lastSeen: DateTime
}

type ConnectedVehicle {
  id: ID!
  vehicle: Vehicle!
  profile: VehicleProfile!
  status: VehicleStatus
  location: Location
  odometer: OdoReading
  alerts: [VehicleAlert!]
  fuelLevel: FuelLevel
  batteryLevel: BatteryLevel
  chargeStatus: ChargeStatus
  tirePressure: TireStatus
  diagnostics: [DiagnosticCode!]
  recalls: [Recall!]
}

# ─────────────────────────────────────────────
# Vehicle Status
# ─────────────────────────────────────────────

type VehicleStatus {
  vehicleId: ID!
  ignition: IgnitionStatus
  doors: [DoorStatus!]
  windows: [WindowStatus!]
  locks: LockStatus
  lastUpdated: DateTime!
}

type IgnitionStatus {
  state: IgnitionState!
  changedAt: DateTime
}

type DoorStatus {
  position: String!
  state: DoorState!
  changedAt: DateTime
}

type WindowStatus {
  position: String!
  state: WindowState!
  changedAt: DateTime
}

type LockStatus {
  state: LockState!
  changedAt: DateTime
}

# ─────────────────────────────────────────────
# Fuel and Odometer
# ─────────────────────────────────────────────

type FuelLevel {
  vehicleId: ID!
  percentRemaining: Percentage
  distanceToEmpty: Kilometers
