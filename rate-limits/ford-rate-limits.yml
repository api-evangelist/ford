specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Ford
providerId: ford
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Automobiles
  - Connected Vehicle
  - Rate Limiting
description: Ford's Developer Marketplace does not publish numeric API rate limits. Throttles are sized per partner agreement and per-vehicle data-fetch policies (e.g. minimum poll intervals on telemetry endpoints to protect vehicle modems and battery). Standard 429/503 conventions are expected.
notes: No public RPS/RPM at developer.ford.com. Vehicle-touching endpoints typically enforce minimum polling intervals (commonly tens of seconds) to protect TCU/modem; exact numbers per partnership.
sources:
  - https://developer.ford.com/
  - https://developer.ford.com/apis
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-partner API throttle
    scope: partner/api-key
    metric: varies
    limit: per-partner agreement; not publicly published
    applies:
      - Ford Connected Vehicle API
      - Ford FordPass API
      - Ford Dealer / Fleet API
  - name: Per-vehicle telemetry poll minimum
    scope: vehicle
    metric: minimum_poll_interval
    limit: enforced per endpoint to protect TCU/modem; not publicly published
    applies:
      - Ford Connected Vehicle Telemetry
policies:
  - name: Backoff Strategy
    description: Clients should implement exponential backoff with jitter on 429/5xx and honor Retry-After when present.
  - name: Vehicle-Touch Throttling
    description: Endpoints that wake or query the vehicle TCU enforce minimum poll intervals to protect 12V battery and modem; subscribe to webhooks/streaming where available rather than polling.
  - name: Customer Consent
    description: Per-VIN access is gated by the vehicle owner's consent on FordPass; revoked consent terminates throttling allocation immediately.
maintainers: []
